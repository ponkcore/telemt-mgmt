# ─────────────────────────────────────────────────────────────────────────────
# Grafana dashboard provisioning — auto-imports dashboards on first start.
# Per TKT-011 AC3: Grafana auto-provisions both dashboards on first start.
#
# Dashboards are JSON files in /var/lib/grafana/dashboards (mounted from
# ./grafana/dashboards/ in docker-compose.yml).
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: 1

providers:
  - name: telemt-dashboards
    orgId: 1
    folder: Telemt
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
