# ─────────────────────────────────────────────────────────────────────────────
# Grafana datasource provisioning — auto-configures Prometheus on first start.
# Per TKT-011 AC3: Grafana auto-provisions both dashboards on first start.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
