# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — telemt + Xray-exit + Angie on the EU exit server.
#
# Per ARCH-001@0.2.0 §3 C5/C7 / ADR-009@0.2.0:
#   - Xray-exit terminates the VLESS-Reality tunnel from the entry server on :443
#   - Xray-exit forwards decrypted MTProto to telemt on localhost:8443
#   - telemt listens on :8443 (internal only, not exposed externally)
#   - Angie serves the mask host on :8080 (NOT :443)
#   - All services use network_mode: host (for localhost:8443 communication)
#
# Per INV-DOCKER (project.jsonc invariants):
#   cap_drop: [ALL], read_only: true where possible,
#   security_opt: [no-new-privileges:true]
#   telemt adds cap_add: [NET_BIND_SERVICE]
#
# Per ARCH-001 §3 C5 / knowledge report §7.5:
#   - ulimit nofile: 65536 soft, 262144 hard
# ─────────────────────────────────────────────────────────────────────────────

services:
  telemt:
    image: ghcr.io/telemt/telemt:latest
    container_name: telemt-exit
    restart: unless-stopped
    network_mode: host
    # D3: telemt's working dir is /app, but config is mounted at /etc/telemt/.
    # Explicitly pass the config path so telemt loads our config.toml.
    command: ["/etc/telemt/config.toml"]
    volumes:
      - ./config:/etc/telemt:rw
      - telemt-data:/var/lib/telemt:rw
      # N2 (TKT-024): healthcheck checks /app/config.toml but config is mounted
      # at /etc/telemt/config.toml. Add a supplementary read-only mount so the
      # healthcheck finds the config at the expected path.
      - ./config/config.toml:/app/config.toml:ro
    env_file:
      - .env
    # N1 (TKT-024): telemt writes beobachten.txt and cache/ to /app (working dir),
    # which is root-owned. Run as root and drop read_only so writes succeed.
    # Same pattern as xray-exit. Security invariants preserved:
    # cap_drop:[ALL], security_opt:[no-new-privileges:true], cap_add:[NET_BIND_SERVICE].
    user: "0:0"
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ulimits:
      nofile:
        soft: 65536
        hard: 262144

  xray-exit:
    image: ghcr.io/xtls/xray-core:latest
    container_name: xray-exit
    restart: unless-stopped
    network_mode: host
    volumes:
      # D2: xray-core image uses /usr/local/etc/xray/ as its config directory.
      - ./xray-config.json:/usr/local/etc/xray/config.json:ro
    # D5: Xray needs root to bind :443 with cap_add NET_BIND_SERVICE.
    user: "0:0"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ulimits:
      nofile:
        soft: 65536
        hard: 262144
    depends_on:
      - telemt

  angie:
    # D1: Official Angie registry image (angie/angie:latest doesn't exist on Docker Hub).
    image: docker.angie.software/angie:1.8.1-alpine
    container_name: telemt-mask
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./mask:/var/www/mask:ro
      - ./angie.conf:/etc/angie/angie.conf:ro
    # D5: Angie needs to write to cache dirs — remove read_only.
    # Angie entrypoint chowns cache dirs and setgids to the angie user.
    tmpfs:
      - /tmp
      - /var/cache/angie
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    depends_on:
      - telemt

volumes:
  telemt-data:
