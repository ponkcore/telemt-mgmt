# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — telemt + Angie on the EU exit server.
#
# Per INV-DOCKER (project.jsonc invariants):
#   cap_drop: [ALL], read_only: true where possible,
#   security_opt: [no-new-privileges:true]
#   telemt adds cap_add: [NET_BIND_SERVICE]
#
# Per ARCH-001 §3 C5 / knowledge report §7.5:
#   - telemt binds :443 (MTProto/FakeTLS), :9090 (Prometheus), :9091 (API)
#   - Angie serves the mask host on :8080 (NOT :443)
#   - ulimit nofile: 65536 soft, 262144 hard
# ─────────────────────────────────────────────────────────────────────────────

services:
  telemt:
    image: ghcr.io/telemt/telemt:latest
    container_name: telemt-exit
    restart: unless-stopped
    ports:
      - "443:443"
      - "9090:9090"
      - "9091:9091"
    volumes:
      - ./config:/etc/telemt:rw
      - telemt-data:/var/lib/telemt:rw
    env_file:
      - .env
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ulimits:
      nofile:
        soft: 65536
        hard: 262144
    networks:
      - exit

  angie:
    image: angie/angie:latest
    container_name: telemt-mask
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./mask:/var/www/mask:ro
      - ./angie.conf:/etc/angie/angie.conf:ro
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/angie
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - exit
    depends_on:
      - telemt

volumes:
  telemt-data:

networks:
  exit:
    driver: bridge
