# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Angie serving the one-pager landing page.
#
# Per INV-DOCKER (project.jsonc invariants):
#   cap_drop: [ALL], read_only: true where possible,
#   security_opt: [no-new-privileges:true]
#
# The Angie container needs to read static files and bind to port 80/443.
# tmpfs is mounted for /tmp and /var/cache/angie (writable runtime dirs Angie
# needs for temp files and cache) since the root filesystem is read-only.
# ─────────────────────────────────────────────────────────────────────────────

services:
  angie:
    # D1: Official Angie registry image (angie/angie:latest doesn't exist on Docker Hub).
    image: docker.angie.software/angie:1.8.1-alpine
    container_name: telemt-landing
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./html:/var/www/html:ro
      - ./angie.conf:/etc/angie/angie.conf:ro
      - ./certs:/etc/angie/certs:ro
    # D5: Angie needs to write to cache dirs — remove read_only.
    # Angie entrypoint chowns cache dirs and setgids to the angie user.
    tmpfs:
      - /tmp
      - /var/cache/angie
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - landing

networks:
  landing:
    driver: bridge
