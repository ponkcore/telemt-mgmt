<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Получить прокси</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                         "Helvetica Neue", Arial, sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #8b949e;
            margin-bottom: 2.5rem;
            line-height: 1.5;
        }

        .btn-get-proxy {
            display: inline-block;
            width: 100%;
            padding: 1rem 2rem;
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
            background-color: #2f81f7;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }

        .btn-get-proxy:hover {
            background-color: #1f6feb;
        }

        .btn-get-proxy:active {
            background-color: #1158c7;
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.85rem;
            color: #484f58;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 1rem;
                margin-bottom: 2rem;
            }

            .btn-get-proxy {
                font-size: 1.1rem;
                padding: 0.875rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Telegram MTProxy</h1>
        <p class="subtitle">
            Бесплатный прокси для доступа к Telegram.<br>
            Нажмите кнопку, чтобы получить ссылку.
        </p>
        <a href="__BOT_URL__" class="btn-get-proxy">Получить прокси</a>
        <p class="footer">telemt-mgmt</p>
    </div>
</body>
</html>
