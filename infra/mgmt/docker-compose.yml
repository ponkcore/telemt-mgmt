# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Management server stack: Bot + API + Frontend + PG + Angie.
#
# Per ARCH-001@0.1.1 §3 C5: management server runs bot + admin API + admin
# panel + PostgreSQL, fronted by Angie reverse proxy with Let's Encrypt TLS.
#
# Per INV-DOCKER (project.jsonc invariants):
#   cap_drop: [ALL], read_only: true where possible,
#   security_opt: [no-new-privileges:true]
#
# Per §7 Constraints:
#   PostgreSQL image: postgres:16-alpine
#   Python base image: python:3.12-slim
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Bot + API in a single container (AC6: bot long polling, AC5: API) ──────
  api:
    build:
      context: ../..
      dockerfile: infra/mgmt/Dockerfile.api
    container_name: telemt-mgmt-api
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - mgmt
    depends_on:
      db:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── Frontend: built React SPA served by Angie (AC5: panel accessible) ──────
  frontend:
    # D1: Official Angie registry image (angie/angie:latest doesn't exist on Docker Hub).
    image: docker.angie.software/angie:1.8.1-alpine
    container_name: telemt-mgmt-frontend
    restart: unless-stopped
    volumes:
      - ./frontend/dist:/var/www/panel:ro
      - ./angie.conf:/etc/angie/angie.conf:ro
      - angie-logs:/var/log/angie:rw
      - ./letsencrypt:/etc/letsencrypt:rw
    ports:
      - "80:80"
      - "443:443"
    networks:
      - mgmt
    depends_on:
      - api
    # D5: Angie needs to write to cache dirs — remove read_only.
    # Angie entrypoint chowns cache dirs and setgids to the angie user.
    tmpfs:
      - /tmp
      - /var/cache/angie
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID

  # ── PostgreSQL (AC3: auto-created if DATABASE_URL not provided) ────────────
  # NOTE: PostgreSQL is exempt from cap_drop/no-new-privileges (TKT-025 B2):
  # the entrypoint script needs CHOWN/SETGID/SETUID to initialise the data dir.
  db:
    image: postgres:16-alpine
    container_name: telemt-mgmt-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: telemt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: telemt
    volumes:
      - pg-data:/var/lib/postgresql/data:rw
    networks:
      - mgmt
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemt"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Reverse proxy: Angie with Let's Encrypt (AC5: HTTPS) ──────────────────
  # Angie is the frontend container above — it serves the built React panel
  # on :80/:443 and proxies /api to the api container on :8000.
  # The frontend container IS the reverse proxy (single Angie serves both
  # static panel files and proxies API requests).

volumes:
  pg-data:
  angie-logs:

networks:
  mgmt:
    driver: bridge
